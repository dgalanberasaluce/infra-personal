# Docker versions
authentik_image: "ghcr.io/goauthentik/server:2025.10.3"
authentik_postgres_image: "docker.io/library/postgres:16-alpine"
authentik_redis_image: "docker.io/library/redis:alpine"
cloudflare_tunnel_image: "cloudflare/cloudflared:latest"

# Authentik Ports
authentik_port_http: 9000
authentik_port_https: 9443

# Set up directory
authentik_base_dir: "/opt/authentik"

# Generate with: openssl rand -base64 32
authentik_secret_key: "CHANGE_ME"
authentik_pg_pass: "CHANGE_ME"

# Cloudflare Tunnel
enable_cloudflare_tunnel: false
cloudflare_tunnel_token: ""