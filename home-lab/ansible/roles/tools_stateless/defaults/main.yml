# General Deployment Config
stack_install_dir: "/opt/tools_stateless"
stack_user: "ansible"
stack_group: "ansible"

# --- images version (Pinned for security) ---
tools_stack_it_tools_image: "corentinth/it-tools:2024.10.22-7ca5933"
tools_stack_cyberchef_image: "ghcr.io/gchq/cyberchef:11.0.0"
tools_stack_drawio_image: "jgraph/drawio:24.4.13"
# excalidraw uses "latest"
tools_stack_excalidraw_image: "excalidraw/excalidraw:latest" 
tools_stack_bentopdf_image: "ghcr.io/alam00000/bentopdf-simple:2.2.1"
tools_stack_plantuml_image: "plantuml/plantuml-server:v1.2026.1"
# mermaid uses "latest"
tools_stack_mermaid_image: "ghcr.io/mermaid-js/mermaid-live-editor:latest"
tools_stack_convertx_image: "ghcr.io/c4illin/convertx:v0.15.1"
tools_stack_omni_tools_image: "iib0011/omni-tools:0.6"

# Ports
port_it_tools: "8080"
port_cyberchef: "8081"
port_diagrams: "8082"
port_excalidraw: "8083"
port_bentopdf: "8084"
port_plantuml: "8085"
port_mermaid: "8086"
port_convertx: "8087"
port_omni_tools: "8088"

# Secret (Leave empty to auto-generate on first run)
convertx_jwt_secret: ""
