# Generate docker-compose locally
- name: Ensure local directory exists for generated compose
  file:
    path: "generated/{{ inventory_hostname }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  tags: [generate_manifests]

- name: Render docker-compose.yml locally
  template:
    src: docker-compose.yml.j2
    dest: "generated/{{ inventory_hostname }}/docker-compose-{{role_name}}.yml"
  delegate_to: localhost
  become: false
  tags: [generate_manifests]

# Remote host
- name: Ensure application directory exists
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "ansible"
    group: "docker"
    mode: '0755'

- name: Deploy .env file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "ansible"
    group: "docker"
    mode: '0660'

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "ansible"
    group: "docker"
    mode: '0664'
  notify: Restart Docker Stack

- name: Create required folders
  ansible.builtin.file:
    path: "{{ app_dir }}/{{ item.name }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "docker"
    mode: '2770'
  loop: "{{ app_folders }}"


- name: Ensure Docker Compose is up and running
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
    pull: missing
    remove_orphans: true