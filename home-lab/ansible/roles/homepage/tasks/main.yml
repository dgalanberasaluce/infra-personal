---
# Generate docker-compose locally
- name: Ensure local directory exists for generated services
  file:
    path: "generated/homepage"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  tags: [generate_manifests]

- name: Render services locally
  template:
    src: services.yaml.j2
    dest: "generated/homepage/services.yml"
  delegate_to: localhost
  become: false
  tags: [generate_manifests]

