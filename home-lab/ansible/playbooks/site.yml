# ==============================================================================
# Docker Hosts & Standard Compose Applications
# ==============================================================================
- name: Provision Docker and Deploy Application Stacks
  hosts: docker_hosts
  become: true
  tags: [apps, docker]
  tasks:
    - name: "Set up Docker"
      ansible.builtin.import_role:
        name: docker_install
      tags: install_docker

    - name: "Deploy assigned Docker Compose applications"
      ansible.builtin.include_role:
        # Defaults to the compose role if a custom role is not specified in apps.yml
        name: "{{ app_item.role_name | default('compose_application') }}"
      loop: "{{ applications | default([]) }}"
      loop_control:
        loop_var: app_item
      tags: [generate_manifests, deploy_apps]

