---
# ==============================================================================
# APPLICATION ROUTING & DNS
# proxy-server (caddy) and dns-server (technitium) roles will iterate dynamically over this list.
# ==============================================================================
applications:
  - name: "monitoring"
    role_name: "monitoring_stack"
    domain: "grafana.internal"
    target_ip: "{{ ansible_host }}"
    target_port: 3000

  - name: "paperless"
    role_name: "paperless_ngx"
    domain: "paperless.internal"
    target_ip: "{{ ansible_host }}"
    target_port: 8000

  - name: "linkwarden"
    role_name: "linkwarden"
    domain: "linkwarden.internal"
    target_ip: "{{ ansible_host }}"
    target_port: 3300

  - name: "grimmory"
    role_name: "grimmory"
    domain: "grimmory.internal"
    target_ip: "{{ ansible_host }}"
    target_port: 6060

  - name: "jotty"
    role_name: "jotty"
    domain: "jotty.internal"
    target_ip: "{{ ansible_host }}"
    target_port: 8093

  - name: "tools_stack"
    role_name: "tools_stack"
    stack_services:
      - name: "bytestash"
        domain: "bytestash.internal"
        target_ip: "{{ ansible_host }}"
        target_port: 8089
        homepage:
          name: bytestash
          description: "Code snippet manager"
          group: "Tools"
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/bytestash.svg
      - name: "memos"
        domain: "memos.internal"
        target_ip: "{{ ansible_host }}"
        target_port: 8090
        homepage:
          name: memos
          description: "Note Taking and Personal Knowledge Management"
          group: "Tools"
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/memos.svg


# ==============================================================================
# 2. IMAGE VERSIONS & CONFIGURATIONS (Public/Safe GitOps Data)
# ==============================================================================
# Tools Stack
tools_stack_it_tools_image: "corentinth/it-tools:2024.10.22-7ca5933"
tools_stack_cyberchef_image: "ghcr.io/gchq/cyberchef:11.2.0"
tools_stack_drawio_image: "jgraph/drawio:29.7.12"
tools_stack_bentopdf_image: "ghcr.io/alam00000/bentopdf-simple:2.8.5"
tools_stack_plantuml_image: "plantuml/plantuml-server:v1.2026.6"
tools_stack_convertx_image: "ghcr.io/c4illin/convertx:latest"
tools_stack_omni_tools_image: "iib0011/omni-tools:0.6"
tools_stack_bytestash_image: "ghcr.io/jordan-dalby/bytestash:1.5.12"
tools_stack_memos_image: "neosmemo/memos:0.29.1"

# Monitoring Stack
monitoring_role: "server"
monitor_docker: true
monitoring_stack_alloy_image: "grafana/alloy:v1.17.0"
monitoring_stack_victoriametrics_image: "victoriametrics/victoria-metrics:v1.146.0-scratch"
monitoring_stack_loki_image: "grafana/loki:3.7"
monitoring_stack_grafana_image: "grafana/grafana:12.4.5"
monitoring_stack_pve_exporter_image: "prompve/prometheus-pve-exporter:3.9.0"
monitoring_stack_cadvisor_image: "ghcr.io/google/cadvisor:v0.60.2"

# Linkwarden
linkwarden_image: "ghcr.io/linkwarden/linkwarden:v2.14.1"

# Paperless-ngx
paperless_webserver_image: "ghcr.io/paperless-ngx/paperless-ngx:2.20.15"
paperless_broker_image: "docker.io/library/redis:8.8.0"
paperless_db_image: "docker.io/library/postgres:17.10"
paperless_allowed_hosts: "paperless.internal"
paperless_url: "https://paperless.internal"

# Grimmory
grimmory_image: "ghcr.io/grimmory-tools/grimmory:v3.2.2"
grimmory_db_image: "lscr.io/linuxserver/mariadb:11.4.12"

# Jotty
jotty_image: "ghcr.io/fccview/jotty:1.25.1"

# ==============================================================================
# 3. OPENBAO / HASHICORP VAULT LOOKUPS
# Replaces your local vault.yml and hardcoded plaintext tokens.
# The VAULT_TOKEN environment variable is injected by the GitHub Actions runner.
# ==============================================================================
# Tools Stack Secrets
bytestash_jwt_secret: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.bytestash_jwt_secret }}"

## Monitoring Stack Secrets
grafana_admin_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.grafana_admin_password }}"
pve_exporter_token_value: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.pve_exporter_token_value }}"

## Linkwarden Secrets
linkwarden_postgres_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.linkwarden_postgres_password }}"
linkwaren_meili_key: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.linkwarden_meili_key }}"
linkwarden_nextauth_secret: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.linkwarden_nextauth_secret }}"

## Paperless Secrets
paperless_admin_user: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.paperless_admin_user }}"
paperless_admin_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.paperless_admin_password }}"
paperless_admin_email: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.paperless_admin_email }}"
paperless_secret_key: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.paperless_secret_key }}"
paperless_db_user: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.paperless_db_user }}"
paperless_db_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.paperless_db_password }}"

## Grimmory
grimmory_db_root_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.booklore_db_root_password }}"
grimmory_db_password: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.booklore_db_password }}"

## Jotty
jotty_app_port: 8093
jotty_uid: 2002
jotty_gid: 991

# # DNS API Variables (Moved from playbook)
technitium_api_url: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.technitium_api_url }}"
technitium_token: "{{ lookup('community.hashi_vault.vault_kv2_get', 'proxmox/srv-prod-01/secrets', engine_mount_point='ansible').data.data.technitium_token }}"